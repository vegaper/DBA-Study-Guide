name: Deploy Quarto site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- PASOS CONDICIONALES (Solo se ejecutan si el commit lleva la etiqueta [render]) ---
      - name: Setup R
        if: contains(github.event.head_commit.message, '[render]')
        uses: r-lib/actions/setup-r@v2

      - name: Install R Packages
        if: contains(github.event.head_commit.message, '[render]')
        run: Rscript -e 'install.packages(c("yaml", "knitr", "rmarkdown"))'

      - name: Setup Quarto
        if: contains(github.event.head_commit.message, '[render]')
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Project
        if: contains(github.event.head_commit.message, '[render]')
        run: quarto render
      # --------------------------------------------------------------------------------------

      # --- PASOS FIJOS (Siempre se ejecutan para subir lo que haya en la carpeta _site) ---
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
